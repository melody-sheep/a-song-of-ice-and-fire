<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐺 Winterfell - Map Editor</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="winterfell.css">
</head>
<body>
    <!-- ====== BACKGROUND ====== -->
    <div id="background-layer">
        <div class="vignette-overlay"></div>
        <div class="grain-overlay"></div>
        <div class="dark-overlay"></div>
        <div class="vignette-black"></div>
    </div>
    
    <!-- ====== CLOUDS ====== -->
    <div id="clouds-layer">
        <div class="cloud cloud-1 left"></div>
        <div class="cloud cloud-2 right"></div>
        <div class="cloud cloud-3 left"></div>
        <div class="cloud cloud-4 right"></div>
        <div class="cloud cloud-5 left"></div>
        <div class="cloud cloud-6 right"></div>
        <div class="cloud cloud-7 left"></div>
        <div class="cloud cloud-8 right"></div>
    </div>
    
    <!-- ====== PARTICLES ====== -->
    <div id="particles-container"></div>
    
    <!-- ====== TOP BAR ====== -->
    <header id="topBar">
        <div class="topbar-left">
            <button id="backBtn" class="back-btn" title="Back to Map">← BACK</button>
            <span class="topbar-sigil">🐺</span>
            <span class="topbar-name">WINTERFELL</span>
            <span class="topbar-house">House Stark</span>
        </div>
        <div class="topbar-center">
            <span class="topbar-coords" id="coordDisplay">📍 0, 0</span>
            <span class="topbar-zoom" id="zoomDisplay">🔍 100%</span>
        </div>
        <div class="topbar-right">
            <button class="topbar-btn" id="saveBtn">💾 SAVE</button>
            <button class="topbar-btn" id="loadBtn">📂 LOAD</button>
            <button class="topbar-btn" id="resetViewBtn">⟲ RESET</button>
        </div>
    </header>

    <!-- ====== MAIN LAYOUT ====== -->
    <div id="mainLayout">
        
        <!-- ====== MAP PANEL ====== -->
        <div id="mapPanel">
            <div class="panel-header">
                <span class="panel-title">⛰ WINTERFELL MAP</span>
                <span class="panel-sub">The North Remembers</span>
                <div class="panel-controls">
                    <button class="zoom-btn" id="zoomInBtn">＋</button>
                    <button class="zoom-btn" id="zoomOutBtn">−</button>
                    <button class="zoom-btn" id="zoomFitBtn">⊡</button>
                </div>
            </div>
            <div id="mapContainer">
                <div id="gridWrapper">
                    <div id="gridContainer">
                        <!-- Grid generated by JavaScript -->
                    </div>
                </div>
            </div>
            <div class="panel-footer">
                <span>📐 Grid: <span id="gridSizeDisplay">20 × 12</span></span>
                <span>📍 Hover: <span id="hoverCoordDisplay">—</span></span>
                <span>🔍 Zoom: <span id="zoomLevelDisplay">100%</span></span>
            </div>
        </div>

        <!-- ====== SIDE PANEL ====== -->
        <div id="sidePanel">
            
            <div class="side-header">
                <span class="side-icon">📋</span>
                <span class="side-title">CONTROLS</span>
            </div>

            <!-- GRID SIZE -->
            <div class="dropdown-section">
                <button class="dropdown-toggle active" data-target="gridSizeMenu">
                    <span class="dropdown-icon">📐</span>
                    <span class="dropdown-label">Grid Size</span>
                    <span class="dropdown-arrow">▾</span>
                </button>
                <div class="dropdown-content open" id="gridSizeMenu">
                    <button class="option-btn" data-cols="10" data-rows="8">10 × 8</button>
                    <button class="option-btn active" data-cols="20" data-rows="12">20 × 12</button>
                    <button class="option-btn" data-cols="30" data-rows="16">30 × 16</button>
                    <button class="option-btn" data-cols="40" data-rows="20">40 × 20</button>
                    <button class="option-btn" data-cols="50" data-rows="30">50 × 30</button>
                </div>
            </div>

            <!-- BUILDING -->
            <div class="dropdown-section">
                <button class="dropdown-toggle" data-target="buildingMenu">
                    <span class="dropdown-icon">🏗</span>
                    <span class="dropdown-label">Building</span>
                    <span class="dropdown-arrow">▾</span>
                </button>
                <div class="dropdown-content" id="buildingMenu">
                    <button class="option-btn">🏠 House</button>
                    <button class="option-btn">🏰 Castle</button>
                    <button class="option-btn">🏡 Wood House</button>
                    <button class="option-btn">🧱 Wall</button>
                    <button class="option-btn">🗼 Watch Tower</button>
                    <button class="option-btn">🏛 Great Hall</button>
                    <button class="option-btn">🛖 Hut</button>
                    <button class="option-btn">⛪ Sept</button>
                </div>
            </div>

            <!-- FARMING -->
            <div class="dropdown-section">
                <button class="dropdown-toggle" data-target="farmingMenu">
                    <span class="dropdown-icon">🌾</span>
                    <span class="dropdown-label">Farming</span>
                    <span class="dropdown-arrow">▾</span>
                </button>
                <div class="dropdown-content" id="farmingMenu">
                    <button class="option-btn">🌾 Wheat Farm</button>
                    <button class="option-btn">🌽 Corn Field</button>
                    <button class="option-btn">🍎 Orchard</button>
                    <button class="option-btn">🐑 Pasture</button>
                    <button class="option-btn">🐖 Pig Pen</button>
                    <button class="option-btn">🐄 Cattle Ranch</button>
                    <button class="option-btn">🌿 Herb Garden</button>
                    <button class="option-btn">🍇 Vineyard</button>
                </div>
            </div>

            <!-- HUNTING -->
            <div class="dropdown-section">
                <button class="dropdown-toggle" data-target="huntingMenu">
                    <span class="dropdown-icon">🏹</span>
                    <span class="dropdown-label">Hunting</span>
                    <span class="dropdown-arrow">▾</span>
                </button>
                <div class="dropdown-content" id="huntingMenu">
                    <button class="option-btn">🌲 Hunting Lodge</button>
                    <button class="option-btn">🐺 Wolf Den</button>
                    <button class="option-btn">🦌 Deer Grounds</button>
                    <button class="option-btn">🐗 Boar Territory</button>
                    <button class="option-btn">🦅 Falconry</button>
                    <button class="option-btn">🐻 Bear Cave</button>
                    <button class="option-btn">🦊 Fox Burrow</button>
                </div>
            </div>

            <!-- MILITARY -->
            <div class="dropdown-section">
                <button class="dropdown-toggle" data-target="militaryMenu">
                    <span class="dropdown-icon">⚔</span>
                    <span class="dropdown-label">Military</span>
                    <span class="dropdown-arrow">▾</span>
                </button>
                <div class="dropdown-content" id="militaryMenu">
                    <button class="option-btn">⚔ Barracks</button>
                    <button class="option-btn">🛡 Armory</button>
                    <button class="option-btn">🏹 Archer Range</button>
                    <button class="option-btn">🐴 Stables</button>
                    <button class="option-btn">🗡 Training Grounds</button>
                    <button class="option-btn">🚩 War Tent</button>
                    <button class="option-btn">🏰 Garrison</button>
                </div>
            </div>

            <!-- TERRAIN -->
            <div class="dropdown-section">
                <button class="dropdown-toggle" data-target="terrainMenu">
                    <span class="dropdown-icon">🟫</span>
                    <span class="dropdown-label">Terrain</span>
                    <span class="dropdown-arrow">▾</span>
                </button>
                <div class="dropdown-content" id="terrainMenu">
                    <button class="option-btn">🟩 Grass</button>
                    <button class="option-btn">⬜ Snow</button>
                    <button class="option-btn">🟧 Dirt</button>
                    <button class="option-btn">🟤 Mud</button>
                    <button class="option-btn">🟦 Water</button>
                    <button class="option-btn">⬛ Stone</button>
                    <button class="option-btn">🟩 Dark Grass</button>
                    <button class="option-btn">⬜ Patchy Snow</button>
                    <button class="option-btn">🟨 Sand</button>
                    <button class="option-btn">🟫 Forest Floor</button>
                </div>
            </div>

            <!-- DECORATIONS -->
            <div class="dropdown-section">
                <button class="dropdown-toggle" data-target="decoMenu">
                    <span class="dropdown-icon">🎨</span>
                    <span class="dropdown-label">Decorations</span>
                    <span class="dropdown-arrow">▾</span>
                </button>
                <div class="dropdown-content" id="decoMenu">
                    <button class="option-btn">🪨 Rock</button>
                    <button class="option-btn">🌲 Pine Tree</button>
                    <button class="option-btn">🌳 Oak Tree</button>
                    <button class="option-btn">🔥 Campfire</button>
                    <button class="option-btn">🚩 Banner</button>
                    <button class="option-btn">🪵 Log Pile</button>
                    <button class="option-btn">🌸 Flowers</button>
                    <button class="option-btn">❄ Snow Patch</button>
                    <button class="option-btn">🍂 Leaves</button>
                    <button class="option-btn">💀 Bones</button>
                </div>
            </div>

            <!-- RESOURCES -->
            <div class="dropdown-section">
                <button class="dropdown-toggle" data-target="resourceMenu">
                    <span class="dropdown-icon">📊</span>
                    <span class="dropdown-label">Resources</span>
                    <span class="dropdown-arrow">▾</span>
                </button>
                <div class="dropdown-content" id="resourceMenu">
                    <button class="option-btn">🪵 Lumber Mill</button>
                    <button class="option-btn">🪙 Gold Mine</button>
                    <button class="option-btn">🪨 Stone Quarry</button>
                    <button class="option-btn">💧 Well</button>
                    <button class="option-btn">🌿 Herb Garden</button>
                    <button class="option-btn">🪨 Iron Mine</button>
                    <button class="option-btn">🌊 Fishing Dock</button>
                </div>
            </div>

            <!-- TOOLS -->
            <div class="tools-section">
                <div class="tools-header">
                    <span class="tools-icon">🛠</span>
                    <span class="tools-title">Tools</span>
                </div>
                <div class="tools-grid">
                    <button class="tool-btn active">🖌 Paint</button>
                    <button class="tool-btn">🗑 Erase</button>
                    <button class="tool-btn">👆 Select</button>
                    <button class="tool-btn">📏 Measure</button>
                    <button class="tool-btn">🔄 Rotate</button>
                    <button class="tool-btn">📋 Copy</button>
                </div>
            </div>

            <!-- ACTIONS -->
            <div class="actions-section">
                <button class="action-btn primary">✅ Apply</button>
                <button class="action-btn secondary">🔄 Reset</button>
                <button class="action-btn danger">🗑 Clear All</button>
            </div>

        </div>
    </div>

    <!-- ====== BOTTOM STATUS BAR ====== -->
    <div id="bottomBar">
        <span class="status-item">📐 Grid: <span id="statusGrid">20 × 12</span></span>
        <span class="status-item">📍 Position: <span id="statusCoord">—</span></span>
        <span class="status-item">🔍 Zoom: <span id="statusZoom">100%</span></span>
        <span class="status-item">📦 Cells: <span id="statusCells">240</span></span>
        <span class="status-item">⚡ Ready</span>
    </div>

    <!-- ====== SCRIPTS ====== -->
    <script src="winterfell.js"></script>
</body>
</html>
