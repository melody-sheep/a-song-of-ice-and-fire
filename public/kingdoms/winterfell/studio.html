<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏰 Winterfell Map Studio</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="studio.css">
</head>
<body>
    <!-- ====== TOP BAR ====== -->
    <header id="topBar">
        <div class="topbar-left">
            <span class="topbar-sigil">🐺</span>
            <span class="topbar-title">WINTERFELL MAP STUDIO</span>
            <span class="topbar-version">v1.0</span>
        </div>
        <div class="topbar-center">
            <span class="topbar-coords" id="coordDisplay">📍 0, 0</span>
            <span class="topbar-zoom" id="zoomDisplay">🔍 100%</span>
        </div>
        <div class="topbar-right">
            <button class="topbar-btn" id="saveBtn">💾 Save</button>
            <button class="topbar-btn" id="loadBtn">📂 Load</button>
            <button class="topbar-btn" id="exportBtn">📤 Export</button>
            <button class="topbar-btn" id="resetBtn">🔄 Reset</button>
            <button class="topbar-btn" id="helpBtn">❓ Help</button>
            <button class="topbar-btn" id="closeBtn">✕</button>
        </div>
    </header>

    <!-- ====== MAIN LAYOUT ====== -->
    <div id="mainLayout">
        
        <!-- ====== LEFT: ASSET PANEL ====== -->
        <aside id="assetPanel">
            <!-- Terrain Section -->
            <div class="asset-section">
                <div class="section-header">
                    <span class="section-icon">🟫</span>
                    <span class="section-title">TERRAIN</span>
                    <span class="section-toggle">▼</span>
                </div>
                <div class="asset-grid" id="terrainGrid">
                    <!-- Generated by JavaScript -->
                </div>
            </div>

            <!-- Trees Section -->
            <div class="asset-section">
                <div class="section-header">
                    <span class="section-icon">🌲</span>
                    <span class="section-title">TREES</span>
                    <span class="section-toggle">▼</span>
                </div>
                <div class="asset-grid" id="treeGrid">
                    <!-- Generated by JavaScript -->
                </div>
            </div>

            <!-- Buildings Section -->
            <div class="asset-section">
                <div class="section-header">
                    <span class="section-icon">🏰</span>
                    <span class="section-title">BUILDINGS</span>
                    <span class="section-toggle">▼</span>
                </div>
                <div class="asset-grid" id="buildingGrid">
                    <!-- Generated by JavaScript -->
                </div>
            </div>

            <!-- Decorations Section -->
            <div class="asset-section">
                <div class="section-header">
                    <span class="section-icon">🪨</span>
                    <span class="section-title">DECORATIONS</span>
                    <span class="section-toggle">▼</span>
                </div>
                <div class="asset-grid" id="decoGrid">
                    <!-- Generated by JavaScript -->
                </div>
            </div>
        </aside>

        <!-- ====== CENTER: CANVAS ====== -->
        <main id="canvasContainer">
            <div id="canvasWrapper">
                <canvas id="mapCanvas"></canvas>
                <!-- Grid overlay (HTML overlay for better performance) -->
                <div id="gridOverlay"></div>
            </div>
        </main>

        <!-- ====== RIGHT: INFO PANEL ====== -->
        <aside id="infoPanel">
            <div class="info-section">
                <div class="section-header">
                    <span class="section-icon">📋</span>
                    <span class="section-title">SELECTED</span>
                </div>
                <div id="selectedInfo">
                    <p class="info-placeholder">Click a cell to inspect</p>
                </div>
            </div>

            <div class="info-section">
                <div class="section-header">
                    <span class="section-icon">📊</span>
                    <span class="section-title">MAP STATS</span>
                </div>
                <div id="mapStats">
                    <div class="stat-row"><span class="stat-label">Grid:</span><span class="stat-value" id="statGrid">18 x 10</span></div>
                    <div class="stat-row"><span class="stat-label">Cells:</span><span class="stat-value" id="statCells">180</span></div>
                    <div class="stat-row"><span class="stat-label">Trees:</span><span class="stat-value" id="statTrees">0</span></div>
                    <div class="stat-row"><span class="stat-label">Buildings:</span><span class="stat-value" id="statBuildings">0</span></div>
                    <div class="stat-row"><span class="stat-label">Decorations:</span><span class="stat-value" id="statDecos">0</span></div>
                </div>
            </div>

            <div class="info-section">
                <div class="section-header">
                    <span class="section-icon">⌨️</span>
                    <span class="section-title">SHORTCUTS</span>
                </div>
                <div id="shortcuts">
                    <div class="shortcut-row"><span class="shortcut-key">1-4</span><span class="shortcut-desc">Select tool</span></div>
                    <div class="shortcut-row"><span class="shortcut-key">G</span><span class="shortcut-desc">Toggle grid</span></div>
                    <div class="shortcut-row"><span class="shortcut-key">Z/X</span><span class="shortcut-desc">Zoom in/out</span></div>
                    <div class="shortcut-row"><span class="shortcut-key">S</span><span class="shortcut-desc">Save map</span></div>
                    <div class="shortcut-row"><span class="shortcut-key">R</span><span class="shortcut-desc">Reset view</span></div>
                    <div class="shortcut-row"><span class="shortcut-key">ESC</span><span class="shortcut-desc">Deselect</span></div>
                </div>
            </div>
        </aside>
    </div>

    <!-- ====== TOOLBAR ====== -->
    <div id="toolbar">
        <button class="tool-btn active" data-tool="paint" title="Paint Terrain">🖌 Paint</button>
        <button class="tool-btn" data-tool="tree" title="Place Trees">🌲 Tree</button>
        <button class="tool-btn" data-tool="building" title="Place Buildings">🏗 Building</button>
        <button class="tool-btn" data-tool="deco" title="Place Decorations">🎨 Deco</button>
        <button class="tool-btn" data-tool="erase" title="Erase">🗑 Erase</button>
        <button class="tool-btn" data-tool="select" title="Select/Inspect">👆 Select</button>
        <span class="toolbar-divider"></span>
        <button class="tool-btn" id="gridToggle" title="Toggle Grid">⊞ Grid</button>
        <button class="tool-btn" id="zoomIn" title="Zoom In">🔍+</button>
        <button class="tool-btn" id="zoomOut" title="Zoom Out">🔍−</button>
        <button class="tool-btn" id="zoomReset" title="Reset Zoom">⟲ Reset</button>
    </div>

    <!-- ====== NOTIFICATION ====== -->
    <div id="notification" class="hidden">
        <span id="notificationText"></span>
    </div>

    <!-- ====== SCRIPTS ====== -->
    <script src="studio.js"></script>
</body>
</html>
