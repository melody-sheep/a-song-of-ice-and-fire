<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐺 Westeros Rising</title>
    
    <!-- Google Fonts - Medieval Style -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Layer -->
    <div id="background-layer"></div>
    
    <!-- Cloud Layers -->
    <div id="clouds-layer">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
        <div class="cloud cloud-4"></div>
        <div class="cloud cloud-5"></div>
        <div class="cloud cloud-6"></div>
    </div>
    
    <!-- Main Content -->
    <div id="main-content">
        <div id="particles-container"></div>
        
        <div class="title-container">
            <h1 class="main-title">WESTEROS</h1>
            <h2 class="sub-title">R I S I N G</h2>
            <div class="title-line"></div>
            <p class="tagline">"Winter is Coming"</p>
        </div>
        
        <button id="beginBtn" class="begin-button">
            <span class="button-text">BEGIN YOUR CONQUEST</span>
            <span class="button-subtext">Enter the World of Ice and Fire</span>
        </button>
        
        <div class="footer">
            <p>⚔️ A Game of Thrones Inspired Experience ⚔️</p>
        </div>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
